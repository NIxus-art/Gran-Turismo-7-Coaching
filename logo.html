<!DOCTYPE html>
<html>
<head>
    <title>GT7 Driving Coach Logo</title>
    <style>
        body { margin: 0; padding: 50px; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .logo-container { position: relative; }
        .logo-circle {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 50%, #ffd93d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.5), inset 0 0 30px rgba(0,0,0,0.3);
        }
        .logo-text {
            font-family: Arial, sans-serif;
            font-size: 80px;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .racing-stripes {
            position: absolute;
            top: 50%;
            left: -50px;
            right: -50px;
            height: 30px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                white 20px,
                white 30px
            );
            opacity: 0.3;
            transform: translateY(-50%) rotate(-15deg);
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="racing-stripes"></div>
        <div class="logo-circle">
            <div class="logo-text">GT7</div>
        </div>
    </div>
</body>
</html>
